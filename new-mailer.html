<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Layout</title>

<style>

.container_new {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 20px;
    max-width: 750px;
    width: 100%;
}

.card {
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    background: #fff;
}

/* Left Large Image */
.card-large {
    grid-row: span 2;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* Blue Text Card */
.card-blue {
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #2d7ef7, #0ea5e9);
    color: #fff;
    font-weight: bold;
    font-size: 24px;
    padding: 30px;
    position: relative;
}

.card-blue span {
    max-width: 180px;
    line-height: 1.3;
}

.arrow {
    position: absolute;
    right: 25px;
    bottom: 25px;
    font-size: 22px;
}

/* Bottom Right Image */
.card-small {
    height: 200px;
}

/* Responsive */
@media (max-width: 768px) {
    .container_new {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
    }

    .card-large {
        grid-row: span 1;
    }

    .card-small {
        height: auto;
    }
}
</style>
</head>
<body>

<div class="container_new">

    <!-- Left Large Image -->
    <div class="card card-large">
        <img src="image.png" alt="Working on Laptop">
    </div>

    <!-- Top Right Blue Card -->
    <div class="card card-blue">
        <span>Learn More About The Program.</span>
        <div class="arrow">→</div>
    </div>

    <!-- Bottom Right Image -->
    <div class="card card-small">
        <img src="banner.jpg" alt="Students Working">
    </div>

</div>

</body>
</html>
